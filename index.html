<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <script src="./script.js" defer></script>
</head>

<body>
    <div class="container">
        <div id="result">Play a game!</div>
        <div class="choices-container">
            <div id="computer" class="choice"></div>
            <div id="human" class="choice"></div>
        </div>

        <div id="player-buttons">
            <button id="rock"  class="btn-choice">Rock</button>
            <button id="paper" class="btn-choice">Paper</button>
            <button id="scissors" class="btn-choice">Scissors</button>
        </div>

        <div id="scores"></div>
    </div>
    
    <div class="footer">
        <p>Images provided from: <a href="svgrepo.com">svgrepo</a></p>
        <ul>
            <li><a href="https://www.svgrepo.com/svg/323925/rock">rock</a></li>
            <li><a href="https://www.svgrepo.com/svg/323911/paper">paper</a></li>
            <li><a href="https://www.svgrepo.com/svg/323929/scissors">scissors</a></li>
        </ul>
    </div>
</body>

</html>
